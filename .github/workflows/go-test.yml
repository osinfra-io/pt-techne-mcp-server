name: Go Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    name: "Go: Test"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: 1.26.3

      - name: Verify embedded schema is in sync with canonical schema
        run: |
          diff -u schema/team.schema.json internal/spec/schema_embed.json

      - name: Lint
        uses: golangci/golangci-lint-action@db582008a42febd596419635a5abc9d9815daa9c  # v9.2.1
        with:
          install-mode: goinstall
          version: 66496a99757549ab02ffbadeea72d9eb9d387fc5  # v2.2.1

      - name: Build
        run: go build ./...

      - name: Test
        run: |
          set -o pipefail
          go test -race -coverprofile=cover.out ./... | tee test-results.txt
          go tool cover -func=cover.out | tee coverage.txt

      - name: Add test results to summary
        continue-on-error: true
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const testResults = fs.readFileSync('test-results.txt', 'utf8');
            const coverage = fs.readFileSync('coverage.txt', 'utf8');
            core.summary
              .addHeading('Go Test Results')
              .addCodeBlock(testResults)
              .addHeading('Coverage Summary')
              .addCodeBlock(coverage)
              .write();
