name: Go Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    name: "Go: Test"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: 1.26.3

      - name: Lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee  # v9.2.1
        with:
          install-mode: goinstall
          version: c0d3ddc9cf3faa61a4e378e879ece580256d76e5  # v2.12.2

      - name: Build
        run: go build ./...

      - name: Test
        run: |
          set -o pipefail
          go test -race -coverprofile=cover.out ./... | tee test-results.txt
          go tool cover -func=cover.out | tee coverage.txt

      - name: Add test results to summary
        continue-on-error: true
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const testResults = fs.readFileSync('test-results.txt', 'utf8');
            const coverage = fs.readFileSync('coverage.txt', 'utf8');
            core.summary
              .addHeading('Go Test Results')
              .addCodeBlock(testResults)
              .addHeading('Coverage Summary')
              .addCodeBlock(coverage)
              .write();
